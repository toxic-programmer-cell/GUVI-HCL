<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regestration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./static/logo.png" alt="Logo" height="40" class="d-inline-block align-text-top">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5 ">
                <h5 class="text-center p-3 bg-light">Register Your Details</h5>

                <form id="registerfrom">
                    <div class="from-group mb-2">
                        <input type="text" class="form-control" name="name" id="name" placeholder="Enter your name">
                    </div>
                    <div class="from-group mb-2">
                        <input type="email" class="form-control" name="email" id="email" placeholder="Enter your Email">
                    </div>
                    <div class="from-group mb-2">
                        <input type="number" class="form-control" name="adhar" id="adhar"
                            placeholder="Enter your Adhar Number">
                    </div>

                    <div class="selectgender mb-2">
                        <h6>Gender</h6>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="male" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="female" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-success" type="submit">Submit</button>
                    </div>
                </form>
            </div>
            <div class="col-md-7">
                <div id="showmessage" class="position-absolute top-0 end-0 m-3"></div>
                <h5 class="text-center p-3 bg-light">User Details</h5>
                <div class="row mb-2">
                    <div class="col-5"></div>
                    <div class="col-7">
                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                            <button class="btn btn-outline-success" type="submit">Search</button>
                        </form>
                    </div>
                </div>

                <table class="table table-success">
                    <thead>
                        <tr>
                            <th scope="col">Name</th>
                            <th scope="col">Email</th>
                            <th scope="col">Adhar</th>
                            <th scope="col">Gender</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
