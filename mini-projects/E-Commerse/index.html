<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css"
        integrity="sha512-WxpJXPm/Is1a/dzEdhdaoajpgizHQimaLGL/QqUIAjIihlQqlPQb1V9vkGs9+VzXD7rgI6O+UsSKl4u5K36Ydw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./static/css/style.css">
</head>

<body>
    <section>
        <div class="advertisment">
            <ul>
                <li>Garented Authenticity</li>
                <li>Free Shipping</li>
                <li>Easy Returns</li>
                <li>24/7 Customer Support</li>
                <li>Secure Payment Options</li>
            </ul>
        </div>
    </section>

    <nav>
        <div class="top-nav">
            <div class="search-section">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search here">
            </div>
            <div class="logo">
                <h3>KICK SPORTS</h3>
            </div>
            <div class="user-section">
                <i class="fa-solid fa-user" width="20" height="20"></i>
                <div>
                    <i class="fa-solid fa-cart-arrow-down" width="20" height="20"></i>

                </div>
            </div>
        </div>
        <div class="bottom-nav">
            <ul>
                <li>New Arrivals</li>
                <li>Best Sellers</li>
                <li>Accessories</li>
                <li>Offers</li>
            </ul>
        </div>
    </nav>
</body>

</html>
