<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        h1,
        h2,
        h3,
        p,
        label,
        legend {
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>

    <div class="container my-4">
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6 bg-info d-flex justify-content-center border rounded py-3">
                <form action="" method="post" class="pb-2">
                    <fieldset class="d-flex flex-column">
                        <legend>Enrole Your Details</legend>
                        <label for="" class="form-label">Name</label>

                        <input name="name" for="text" class="form-control" placeholder="Enter your name" required>


                        <label for="" class="form-label">Age</label>

                        <input name="age" for="number" class="form-control" placeholder="Enter your age" required>


                        <label for="" class="form-label">Email</label>

                        <input name="email" for="email" class="form-control" placeholder="Enter your email" required>


                        <label for="" class="form-label">Phone Number</label>

                        <input name="phone" for="tel" class="form-control" placeholder="Enter your phone number"
                            required>



                        <label for="" class="form-label">Gender</label>
                        <select name="Gender" id="" class="form-control">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Others">Others</option>
                        </select>


                        <label for="" class="form-label">State</label>
                        <input for="text" class="form-control" list="States" placeholder="Enter your state">
                        <datalist id="States">
                            <option value="Jharkhand"></option>
                            <option value="Uttar Pardesh"></option>
                            <option value="Bihar"></option>
                            <option value="Delhi"></option>
                            <option value="Mumbai"></option>
                            <option value="Kolkata"></option>
                            <option value="Chennai"></option>
                            <option value="Bangalore"></option>
                            <option value="Hyderabad"></option>
                            <option value="Pune"></option>
                        </datalist>


                        <label for="" class="form-label">Address</label>
                        <textarea class="form-control" name="" id="" cols="20" rows="5" placeholder="Enter your address"
                            required></textarea>


                        <label for="" class="form-label">Date & Time</label>
                        <input class="form-control" type="datetime-local">


                        <label for="" class="form-label">Select Resume</label>
                        <input class="form-control" type="file" accept=".pdf" required>


                        <button type="submit" class="btn btn-primary mt-4">Submit</button>
                    </fieldset>

                </form>
            </div>
            <div class="col-3"></div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
