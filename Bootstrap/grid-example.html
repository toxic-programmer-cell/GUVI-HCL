<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container text-center">
        <div class="row">
            <div class="col">
                Column
            </div>
            <div class="col">
                Column
            </div>
            <div class="col">
                Column
            </div>
        </div>
    </div>
    <hr>
    <div class="container text-center">
        <div class="row bg-info text-white border border-dark rounded">
            <div class="col border border-dark">
                1 of 2
            </div>
            <div class="col border border-dark">
                2 of 2
            </div>
        </div>
        <div class="row bg-success text-white border border-dark rounded mt-2">
            <div class="col border border-dark">
                1 of 3
            </div>
            <div class="col border border-dark">
                2 of 3
            </div>
            <div class="col border border-dark">
                3 of 3
            </div>
        </div>
    </div>
    <hr>
    <div class="container text-center">
        <div class="row border border-dark rounded">
            <div class="col border border-dark">
                1 of 3
            </div>
            <div class="col-6 border border-dark">
                2 of 3 (wider)
            </div>
            <div class="col border border-dark">
                3 of 3
            </div>
        </div>
        <div class="row mt-2 border border-dark">
            <div class="col border border-dark">
                1 of 3
            </div>
            <div class="col-5 border border-dark">
                2 of 3 (wider)
            </div>
            <div class="col border border-dark">
                3 of 3
            </div>
        </div>
    </div>

    <hr>
    <div class="container text-center">
        <div class="row justify-content-md-center">
            <div class="col col-lg-2 border border-dark">
                1 of 3
            </div>
            <div class="col-md-auto border border-dark">
                Variable width content
            </div>
            <div class="col col-lg-2 border border-dark">
                3 of 3
            </div>
        </div>
        <div class="row mt-2">
            <div class=" col border border-dark">
                1 of 3
            </div>
            <div class="col-md-auto border border-dark">
                Variable width content
            </div>
            <div class="col col-lg-2 border border-dark">
                3 of 3
            </div>
        </div>
    </div>

    <hr>
    <div class="container text-center">
        <div class="row">
            <div class="col-6 border border-dark">col</div>
            <div class="col border border-dark">col</div>
            <div class="col border border-dark">col</div>
            <div class="col border border-dark">col</div>
        </div>
        <div class="row mt-2">
            <div class="col-8 border border-dark">col-8</div>
            <div class="col-4 border border-dark">col-4</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
